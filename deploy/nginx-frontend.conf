# Nginx reverse proxy for the Next.js frontend.
# Copy to /etc/nginx/sites-available/sogeloc-frontend, adjust VOTRE_DOMAINE,
# then: sudo ln -s /etc/nginx/sites-available/sogeloc-frontend /etc/nginx/sites-enabled/
#
# Run `sudo certbot --nginx -d VOTRE_DOMAINE -d www.VOTRE_DOMAINE` afterwards
# to add HTTPS automatically (it rewrites this file).

server {
    listen 80;
    server_name VOTRE_DOMAINE www.VOTRE_DOMAINE;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
