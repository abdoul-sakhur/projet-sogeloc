# Nginx reverse proxy for the Strapi backend/admin/API.
# Copy to /etc/nginx/sites-available/sogeloc-backend, adjust api.VOTRE_DOMAINE,
# then: sudo ln -s /etc/nginx/sites-available/sogeloc-backend /etc/nginx/sites-enabled/
#
# Run `sudo certbot --nginx -d api.VOTRE_DOMAINE` afterwards for HTTPS.

server {
    listen 80;
    server_name api.VOTRE_DOMAINE;

    # Strapi media uploads can be large.
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
